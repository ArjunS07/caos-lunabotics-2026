icp_localization_node:
  ros__parameters:
    voxel_leaf_size: 0.05               # metres — downsample for GICP speed
    icp_range_clip: 3.0                 # metres — excludes arena walls (arena is 5 m wide)
    max_iterations: 15
    max_correspondence_distance: 1.0
    fitness_threshold: 0.8              # GICP score above which we fall back to IMU
    submap_size: 8                      # number of past scans in sliding submap
    odom_frame: odom
    base_frame: base_link
    lidar_frame: unilidar_lidar
