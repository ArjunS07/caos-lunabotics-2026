# robot_localization ekf_filter_node — fuse rf2o (/odom_rf2o) + IMU (RealSense).
# Publishes odom→base_link TF and /odometry/filtered (Nav2: point controller at that topic or remap).
# Tune covariances after field testing on regolith.

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    use_control: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /odom_rf2o
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    imu0: /camera/camera/imu
