crater_detector:
  ros__parameters:
    # Minimum depth drop (metres) between a rim pixel and its surroundings
    # to be counted as a crater edge. Raise if flat ground triggers false positives;
    # lower if shallow craters are missed.
    edge_threshold: 0.5

    # Smallest crater radius (metres) to report. Filters out sensor noise clusters.
    min_crater_radius: 0.2

    # Largest crater radius (metres) to report. Filters out the horizon / room walls.
    max_crater_radius: 2.0

    # Minimum number of connected rim pixels required before attempting a circle fit.
    min_edge_points: 20

    # TF frame in which /crater_edges is published. Must be reachable from
    # camera_depth_optical_frame via the TF tree.
    #
    # camera_link  — always available when RealSense is running; use for testing
    #                without the localization stack. Circle fitting is on the
    #                XY plane of camera_link (body frame), which is ~15° off true
    #                ground but close enough for rim shape validation.
    # odom         — use in production when the full stack (rf2o/EKF) is running.
    #                Gives ground-plane-aligned circles suitable for Nav2 costmap.
    output_frame: camera_link

    # Processing rate (Hz). The depth camera publishes at 30 Hz; we throttle here
    # to reduce CPU load on the Jetson Orin Nano.
    processing_rate: 5.0

    # Number of raw depth frames to average before processing. Averaging suppresses
    # per-frame sensor noise so the rim mask is more consistent between ticks.
    # 1 = off (single frame). Higher values reduce jitter but increase latency.
    depth_avg_frames: 3
